apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: disk-exporter
  namespace: prometheus
  labels:
    app.kubernetes.io/name: disk-exporter
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "50%"
  selector:
    matchLabels:
      app.kubernetes.io/name: disk-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: disk-exporter
    spec:
      containers:
      - name: exporter
        # renovate: datasource=docker depName=ghcr.io/cullenmcdermott/disk-exporter
        image: ghcr.io/cullenmcdermott/disk-exporter:latest
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: LISTEN_ADDR
          value: ":9999"
        ports:
        - containerPort: 9999
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9999
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9999
          initialDelaySeconds: 15
          periodSeconds: 30
        resources:
          requests:
            memory: 64Mi
            cpu: 10m
          limits:
            memory: 128Mi
        securityContext:
          privileged: true
        volumeMounts:
        - name: host-dev
          mountPath: /host/dev
          readOnly: true
        - name: host-sys
          mountPath: /host/sys
          readOnly: true
        - name: host-rook
          mountPath: /host/var/lib/rook
          readOnly: true
      tolerations:
      - operator: Exists
      volumes:
      - name: host-dev
        hostPath:
          path: /dev
      - name: host-sys
        hostPath:
          path: /sys
      - name: host-rook
        hostPath:
          path: /var/lib/rook
